<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="SimpleMMO Bot home">
        <span class="brand-mark" aria-hidden="true">
          <img src="/assets/images/mbot-logo.webp" alt="" width="40" height="40">
        </span>
        <span>SimpleMMO Bot</span>

        <span></span><span></span><span></span>

        <a href="{{ '/features/overview/' | relative_url }}">Features</a>
        <a href="{{ '/configuration/' | relative_url }}">Configuration</a>

      </nav>
    </div>

  <main id="main-content" class="doc-shell">

  <div id="portal-modal" class="portal-modal" hidden aria-hidden="true">
    <div class="portal-modal__backdrop" data-modal-cancel></div>
    <section class="portal-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="portal-modal-title">
      <div class="portal-modal__icon" aria-hidden="true">✓</div>
      <p class="eyebrow">Please confirm</p>
      <h2 id="portal-modal-title">Confirm action</h2>
      <p id="portal-modal-message"></p>
      <label id="portal-modal-input-wrap" class="portal-modal__input" hidden><span id="portal-modal-input-label">Value</span><input id="portal-modal-input" autocomplete="off"></label>
      <div class="portal-modal__actions"><button id="portal-modal-cancel" class="button button--ghost" type="button">Cancel</button><button id="portal-modal-confirm" class="button button--primary" type="button">Confirm</button></div>
    </section>
  </div>
  <div id="portal-toast" class="portal-toast" role="status" aria-live="polite" hidden></div>
  <footer class="site-footer">
